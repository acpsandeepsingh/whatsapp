<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WA Bulk Messenger Dashboard</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="container">
      <header class="header-row">
        <h1>WA Bulk Messenger Dashboard</h1>
        <div class="header-actions">
          <input id="xlsInput" type="file" accept=".xls,.xlsx" />
          <button id="importBtn">Import XLS/XLSX</button>
          <button id="addRowBtn" class="secondary">Add Row</button>
        </div>
      </header>

      <section class="panel controls">
        <div class="button-row">
          <button id="startBtn">Start Sending</button>
          <button id="pauseBtn" class="secondary">Pause</button>
          <button id="resumeBtn" class="secondary">Resume</button>
          <button id="stopBtn" class="danger">Stop</button>
          <button id="checkStatusBtn" class="secondary">Check Status</button>
          <button id="saveRowsBtn" class="secondary">Save Rows</button>
        </div>
        <p id="statusText">Idle</p>
      </section>

      <section class="panel">
        <h2>Progress</h2>
        <p id="progressLine">Total: 0 | Sent: 0 | Failed: 0 | Pending: 0</p>
        <progress id="progressBar" value="0" max="100"></progress>
        <pre id="latestLog">No activity yet.</pre>
      </section>

      <section class="panel">
        <h2>Message Template Preview</h2>
        <p class="muted">Use variables like <code>{{mobile}}</code>, <code>{{mobile_number}}</code>, <code>{{sr_no}}</code>.</p>
      </section>

      <section class="panel table-panel">
        <table>
          <thead>
            <tr>
              <th>Sr No</th>
              <th>Mobile Number</th>
              <th>Message Text</th>
              <th>Attachment URL (local or remote)</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="rowsTableBody"></tbody>
        </table>
      </section>
    </main>

    <script src="../../libs/xlsx.full.min.js"></script>
    <script type="module" src="options.js"></script>
  </body>
</html>
