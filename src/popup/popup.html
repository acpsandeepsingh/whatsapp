<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WA Bulk Messenger</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <h1>WA Bulk Messenger</h1>

      <label for="primaryFilter">Contact Filter</label>
      <select id="primaryFilter">
        <option value="all_contacts">All Contacts</option>
        <option value="specific_group">Specific Group</option>
        <option value="label">Label</option>
        <option value="country">Country</option>
      </select>

      <label for="secondaryFilter">Secondary Filter</label>
      <select id="secondaryFilter" disabled>
        <option value="">Not required</option>
      </select>

      <button id="fetchContactsBtn">Fetch Contacts</button>
      <button id="openDashboardBtn" class="secondary">Open Dashboard</button>

      <section class="status-card">
        <p id="statusText">Idle</p>
        <pre id="latestLog">No recent activity.</pre>
      </section>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
