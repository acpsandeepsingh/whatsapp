<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WA Bulk Messenger</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <h1>WA Bulk Messenger</h1>
      <p class="hint">Quick actions</p>

      <button id="openDashboardBtn">Open Dashboard</button>
      <button id="startAutomationBtn">Start Automation</button>
      <button id="checkStatusBtn" class="secondary">Check Status</button>

      <section class="status-card">
        <p id="statusText">Status: Idle</p>
        <pre id="latestLog">No recent activity.</pre>
      </section>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
